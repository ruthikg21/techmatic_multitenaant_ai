<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin — Matic AI Platform</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../admin/admin.css">
  <style>
    .client-card {
      background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #eee;
      transition: box-shadow 0.2s;
    }
    .client-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .client-status { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .client-status.active { background: #d4edda; color: #155724; }
    .client-status.inactive { background: #f8d7da; color: #721c24; }
    .embed-code { background: #1a1a2e; color: #0f0; padding: 14px 16px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; word-break: break-all; position: relative; }
    .embed-code .copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
    .embed-code .copy-btn:hover { background: rgba(255,255,255,0.25); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px 32px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-box h3 { margin-bottom: 18px; font-size: 18px; }
    .api-key-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px 14px; font-family: monospace; font-size: 13px; word-break: break-all; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .info-row:last-child { border: none; }
    .info-label { font-size: 13px; color: #6c757d; }
    .info-value { font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
<div class="admin-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div>
        <img src="https://www.techmaticsys.com/wp-content/uploads/2024/09/logo.png" alt="Techmatic"
          onerror="this.style.display='none'" style="height:28px;margin-bottom:4px;">
        <div class="logo-text">Matic AI</div>
        <div class="logo-tag">Super Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Platform</div>
      <a href="dashboard.html" class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="clients.html" class="nav-item"><i class="fas fa-building"></i> Clients</a>
      <div class="nav-section-label" style="margin-top:8px;">Account</div>
      <a href="../admin/login.html" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" style="background:linear-gradient(135deg,#dc3545,#212529);"><i class="fas fa-crown" style="color:#ffd700;font-size:13px;"></i></div>
        <div>
          <div class="sidebar-user-name" id="adminIdDisplay">Super Admin</div>
          <div class="sidebar-user-role">Matic AI Platform</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><i class="fas fa-crown" style="color:#ffd700;margin-right:8px;"></i>Super Admin Dashboard</div>
      <div class="topbar-actions">
        <div class="status-badge"><span class="status-dot"></span> Platform Active</div>
        <button class="topbar-btn" onclick="loadAll()"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
    </div>

    <div class="page-body">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="loading-spinner" style="margin:auto;display:block;margin-top:12px;"></div></div>
        <div class="stat-card"></div>
        <div class="stat-card"></div>
        <div class="stat-card"></div>
      </div>

      <!-- Clients Table -->
      <div class="card mb-4">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-building"></i> Client Accounts</div>
          <a href="clients.html" class="btn btn-ghost btn-sm">Manage Clients →</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Client Name</th><th>Slug</th><th>Status</th><th>Leads</th><th>Messages</th><th>Created</th>
            </tr></thead>
            <tbody id="clientsBody">
              <tr><td colspan="6" class="empty-state"><i class="fas fa-circle-notch fa-spin"></i> Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Quick Actions -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;">
        <a href="clients.html" class="card" style="display:flex;align-items:center;gap:14px;padding:18px;text-decoration:none;transition:box-shadow 0.2s;cursor:pointer;" onmouseover="this.style.boxShadow='0 4px 20px rgba(147,58,67,0.15)'" onmouseout="this.style.boxShadow=''">
          <div class="stat-icon si-red" style="flex-shrink:0"><i class="fas fa-plus"></i></div>
          <div><div class="fw-600" style="font-size:14px;">Create Client</div><div class="text-muted">Add a new client account</div></div>
        </a>
        <a href="../admin/login.html" class="card" style="display:flex;align-items:center;gap:14px;padding:18px;text-decoration:none;transition:box-shadow 0.2s;" onmouseover="this.style.boxShadow='0 4px 20px rgba(49,130,206,0.15)'" onmouseout="this.style.boxShadow=''">
          <div class="stat-icon si-blue" style="flex-shrink:0"><i class="fas fa-user-shield"></i></div>
          <div><div class="fw-600" style="font-size:14px;">Client Login</div><div class="text-muted">Log in as a client admin</div></div>
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  const API = window.TECHMATIC_ADMIN_API || 'https://techmatic-multitenaant-ai.onrender.com';

  function getToken() { return localStorage.getItem('ts_admin_token'); }
  function getRole() { return localStorage.getItem('ts_admin_role'); }

  // Auth guard
  if (!getToken() || getRole() !== 'superadmin') {
    localStorage.clear();
    window.location.href = '../admin/login.html';
  }

  async function apiFetch(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', 'X-Admin-Token': getToken(), ...options.headers };
    const resp = await fetch(API + path, { ...options, headers });
    if (resp.status === 401 || resp.status === 403) {
      localStorage.clear();
      window.location.href = '../admin/login.html';
      throw new Error('Unauthorized');
    }
    if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.detail || `HTTP ${resp.status}`); }
    return resp.json();
  }

  function fmtTime(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}); } catch { return iso; }
  }

  function esc(str) { var el = document.createElement('div'); el.textContent = str || ''; return el.innerHTML; }

  async function loadAll() {
    await Promise.all([loadStats(), loadClients()]);
  }

  async function loadStats() {
    try {
      const d = await apiFetch('/superadmin/stats');
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="flex-between mb-1">
            <div class="stat-label"><i class="fas fa-building"></i> Total Clients</div>
            <div class="stat-icon si-red"><i class="fas fa-building"></i></div>
          </div>
          <div class="stat-value">${d.total_clients}</div>
          <div class="stat-sub">${d.active_clients} active</div>
        </div>
        <div class="stat-card">
          <div class="flex-between mb-1">
            <div class="stat-label"><i class="fas fa-users"></i> Total Leads</div>
            <div class="stat-icon si-green"><i class="fas fa-users"></i></div>
          </div>
          <div class="stat-value">${d.total_leads}</div>
          <div class="stat-sub">Across all clients</div>
        </div>
        <div class="stat-card">
          <div class="flex-between mb-1">
            <div class="stat-label"><i class="fas fa-comments"></i> Total Messages</div>
            <div class="stat-icon si-blue"><i class="fas fa-comments"></i></div>
          </div>
          <div class="stat-value">${d.total_messages}</div>
          <div class="stat-sub">${d.total_sessions} sessions</div>
        </div>
        <div class="stat-card">
          <div class="flex-between mb-1">
            <div class="stat-label"><i class="fas fa-user-shield"></i> Client Admins</div>
            <div class="stat-icon si-orange"><i class="fas fa-user-shield"></i></div>
          </div>
          <div class="stat-value">${d.total_admins}</div>
          <div class="stat-sub">Registered</div>
        </div>`;
    } catch(e) {
      document.getElementById('statsGrid').innerHTML = `<div class="card" style="padding:20px;grid-column:1/-1;"><div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> ${esc(e.message)}</div></div>`;
    }
  }

  async function loadClients() {
    try {
      const d = await apiFetch('/superadmin/clients');
      const clients = d.clients || [];
      const tbody = document.getElementById('clientsBody');
      if (!clients.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state" style="padding:30px;"><i class="fas fa-inbox" style="display:block;font-size:28px;margin-bottom:8px;opacity:0.2;"></i>No clients yet.</td></tr>';
        return;
      }
      tbody.innerHTML = clients.map(c => `
        <tr>
          <td><div class="fw-600" style="font-size:13px;">${esc(c.client_name)}</div></td>
          <td><code style="font-size:12px;color:#6c757d;">${esc(c.client_slug)}</code></td>
          <td><span class="client-status ${c.is_active ? 'active' : 'inactive'}">${c.is_active ? '● Active' : '○ Inactive'}</span></td>
          <td>${c.lead_count || 0}</td>
          <td>${c.message_count || 0}</td>
          <td class="text-muted" style="font-size:12px;">${fmtTime(c.created_at)}</td>
        </tr>`).join('');
    } catch(e) {
      document.getElementById('clientsBody').innerHTML = `<tr><td colspan="6" class="text-muted" style="padding:16px;">Error loading clients.</td></tr>`;
    }
  }

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', function(e) {
    e.preventDefault();
    localStorage.clear();
    window.location.href = '../admin/login.html';
  });

  document.getElementById('adminIdDisplay').textContent = localStorage.getItem('ts_admin_id') || 'Super Admin';

  loadAll();
</script>
</body>
</html>
