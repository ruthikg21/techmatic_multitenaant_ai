<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads — Techmatic Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-logo"><div>
      <img src="https://www.techmaticsys.com/wp-content/uploads/2024/09/logo.png" alt="Techmatic" onerror="this.style.display='none'" style="height:28px;margin-bottom:4px;">
      <div class="logo-text">Techmatic Systems</div><div class="logo-tag">AI Admin Panel</div>
    </div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="leads.html" class="nav-item active"><i class="fas fa-users"></i> Leads</a>
      <a href="conversations.html" class="nav-item"><i class="fas fa-comments"></i> Conversations</a>
      <div class="nav-section-label" style="margin-top:8px;">Configuration</div>
      <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> AI Settings</a>
      <a href="knowledge.html" class="nav-item"><i class="fas fa-database"></i> Knowledge Base</a>
      <div class="nav-section-label" style="margin-top:8px;">Account</div>
      <a href="account.html" class="nav-item"><i class="fas fa-user-shield"></i> Account</a>
      <a href="../index.html" class="nav-item" target="_blank"><i class="fas fa-external-link-alt"></i> View Website</a>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-user">
      <div class="sidebar-user-avatar"><i class="fas fa-user"></i></div>
      <div><div class="sidebar-user-name" id="adminIdDisplay">Admin</div><div class="sidebar-user-role">Administrator</div></div>
    </div></div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Leads</div>
      <div class="topbar-actions">
        <div class="status-badge"><span class="status-dot"></span> Platform Active</div>
        <button class="topbar-btn" onclick="loadLeads()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button class="topbar-btn danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <div class="page-body">
      <!-- Filters -->
      <div class="card mb-4">
        <div class="card-body" style="padding:14px 20px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
            <div class="search-box" style="flex:1;min-width:200px;">
              <i class="fas fa-search"></i>
              <input type="text" id="searchInput" placeholder="Search name, email, industry…" oninput="filterLeads()">
            </div>
            <select id="statusFilter" class="form-control" style="width:auto;" onchange="filterLeads()">
              <option value="">All Statuses</option>
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="qualified">Qualified</option>
              <option value="closed">Closed</option>
            </select>
            <div id="leadCount" class="text-muted" style="font-size:13px;white-space:nowrap;"></div>
          </div>
        </div>
      </div>

      <!-- Table + Detail split -->
      <div style="display:flex;gap:20px;align-items:flex-start;">
        <!-- Table -->
        <div class="card" style="flex:1;min-width:0;">
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Contact</th><th>Industry / Type</th>
                <th>Problem</th><th>Timeline</th>
                <th>Status</th><th>Created</th><th>Actions</th>
              </tr></thead>
              <tbody id="leadsBody">
                <tr><td colspan="7" class="empty-state" style="padding:40px;text-align:center;">
                  <div class="loading-spinner" style="margin:auto;"></div>
                </td></tr>
              </tbody>
            </table>
          </div>
          <div class="card-footer">
            <span id="leadCountFoot" class="text-muted"></span>
          </div>
        </div>

        <!-- Detail panel -->
        <div id="leadDetail" class="card" style="width:300px;flex-shrink:0;display:none;">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-user-circle"></i> Lead Details</div>
            <button onclick="closeDetail()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9ba3ae;">×</button>
          </div>
          <div class="card-body" id="leadDetailBody"></div>
          <div class="card-footer" style="flex-direction:column;align-items:stretch;gap:10px;">
            <div>
              <label class="form-label mb-1">Update Status</label>
              <select id="detailStatusSel" class="form-control">
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="qualified">Qualified</option>
                <option value="closed">Closed</option>
              </select>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="saveStatus()">
              <i class="fas fa-save"></i> Save Status
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script>
  requireAuth();
  let allLeads = [];
  let selectedLead = null;

  async function loadLeads() {
    try {
      const d = await apiFetch('/admin/leads?limit=300');
      allLeads = d.leads || [];
      filterLeads();
    } catch(e) {
      document.getElementById('leadsBody').innerHTML =
        `<tr><td colspan="7" class="empty-state"><div class="alert alert-error" style="margin:16px;"><i class="fas fa-times-circle"></i> ${esc(e.message)}</div></td></tr>`;
    }
  }

  function filterLeads() {
    const q = (document.getElementById('searchInput').value||'').toLowerCase();
    const st = document.getElementById('statusFilter').value;
    const filtered = allLeads.filter(l => {
      const match = !q || [l.name,l.email,l.industry,l.business_type,l.problem,l.service_interest].some(f=>(f||'').toLowerCase().includes(q));
      const matchSt = !st || l.status===st;
      return match && matchSt;
    });
    renderLeads(filtered);
    document.getElementById('leadCount').textContent = `${filtered.length} of ${allLeads.length} leads`;
    document.getElementById('leadCountFoot').textContent = `Showing ${filtered.length} leads`;
  }

  function renderLeads(leads) {
    const tbody = document.getElementById('leadsBody');
    if (!leads.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state" style="padding:48px;">
        <i class="fas fa-users"></i><p>${allLeads.length ? 'No matching leads.' : 'No leads captured yet. Chat will generate leads automatically.'}</p>
      </div></td></tr>`;
      return;
    }
    tbody.innerHTML = leads.map(l => `
      <tr style="cursor:pointer;" onclick="selectLead(${l.id})">
        <td>
          <div class="fw-600" style="font-size:13px;">${esc(l.name||'—')}</div>
          <div class="text-muted">${esc(l.email||'—')}</div>
          <div class="text-muted">${esc(l.phone||'')}</div>
        </td>
        <td>
          <div>${esc(l.industry||'—')}</div>
          <div class="text-muted">${esc(l.business_type||'')}</div>
        </td>
        <td style="max-width:180px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;" title="${esc(l.problem||'')}">
          ${esc((l.problem||'—').slice(0,60))}
        </div></td>
        <td class="text-muted">${esc(l.timeline||'—')}</td>
        <td>${statusBadge(l.status)}</td>
        <td class="text-muted" style="font-size:12px;">${fmtTime(l.created_at)}</td>
        <td>
          <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();selectLead(${l.id})">
            <i class="fas fa-eye"></i>
          </button>
        </td>
      </tr>`).join('');
  }

  function selectLead(id) {
    selectedLead = allLeads.find(l => l.id === id);
    if (!selectedLead) return;
    document.getElementById('leadDetail').style.display = 'block';
    document.getElementById('detailStatusSel').value = selectedLead.status || 'new';
    document.getElementById('leadDetailBody').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${[
          ['<i class="fas fa-user"></i> Name', selectedLead.name],
          ['<i class="fas fa-envelope"></i> Email', selectedLead.email],
          ['<i class="fas fa-phone"></i> Phone', selectedLead.phone],
          ['<i class="fas fa-industry"></i> Industry', selectedLead.industry],
          ['<i class="fas fa-building"></i> Business Type', selectedLead.business_type],
          ['<i class="fas fa-tools"></i> Service Interest', selectedLead.service_interest],
          ['<i class="fas fa-clock"></i> Timeline', selectedLead.timeline],
        ].filter(([,v])=>v).map(([label,val])=>`
          <div>
            <div style="font-size:11px;font-weight:600;color:#9ba3ae;margin-bottom:2px;">${label}</div>
            <div style="font-size:13px;">${esc(val)}</div>
          </div>
        `).join('')}
        ${selectedLead.problem ? `
          <div>
            <div style="font-size:11px;font-weight:600;color:#9ba3ae;margin-bottom:2px;"><i class="fas fa-exclamation-circle"></i> Problem</div>
            <div style="font-size:13px;line-height:1.5;">${esc(selectedLead.problem)}</div>
          </div>` : ''}
        <div>
          <div style="font-size:11px;font-weight:600;color:#9ba3ae;margin-bottom:2px;"><i class="fas fa-clock"></i> Created</div>
          <div style="font-size:12px;color:#9ba3ae;">${fmtTime(selectedLead.created_at)}</div>
        </div>
        <div>
          <a href="conversations.html?session=${encodeURIComponent(selectedLead.session_id||'')}" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;">
            <i class="fas fa-comments"></i> View Conversation
          </a>
        </div>
      </div>`;
  }

  function closeDetail() {
    document.getElementById('leadDetail').style.display = 'none';
    selectedLead = null;
  }

  async function saveStatus() {
    if (!selectedLead) return;
    const status = document.getElementById('detailStatusSel').value;
    try {
      await apiFetch(`/admin/leads/${selectedLead.id}`, { method:'PATCH', body: JSON.stringify({status}) });
      selectedLead.status = status;
      const idx = allLeads.findIndex(l=>l.id===selectedLead.id);
      if (idx>=0) allLeads[idx].status = status;
      filterLeads();
      showNotif('Lead status updated!');
    } catch(e) { showNotif(e.message, 'error'); }
  }

  loadLeads();
</script>
</body>
</html>
